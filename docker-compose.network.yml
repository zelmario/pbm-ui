# Use this override when MongoDB runs on the same Docker host.
# Start with: docker compose -f docker-compose.yml -f docker-compose.network.yml up --build -d
services:
  backend:
    networks:
      - default
      - pbm_network

networks:
  pbm_network:
    name: ${PBM_DOCKER_NETWORK:?Set PBM_DOCKER_NETWORK in .env}
    external: true
